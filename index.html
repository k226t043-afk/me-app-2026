<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カレンダーアプリ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <button id="prevMonth">&lt;</button>
            <h1 id="monthDisplay">2026年 5月</h1>
            <button id="nextMonth">&gt;</button>
        </header>
        <div class="calendar-grid">
            <div class="day-header">日</div>
            <div class="day-header">月</div>
            <div class="day-header">火</div>
            <div class="day-header">水</div>
            <div class="day-header">木</div>
            <div class="day-header">金</div>
            <div class="day-header">土</div>
            <div id="calendarBody" class="calendar-body">
                <!-- Days will be generated by JS -->
            </div>
        </div>
    </div>

    <!-- Event Modal -->
    <div id="eventModal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2 id="modalDate">日付</h2>
            <textarea id="eventInput" placeholder="予定を入力してください"></textarea>
            <div class="modal-footer">
                <button id="deleteEvent" class="delete-btn">削除</button>
                <button id="saveEvent" class="save-btn">保存</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
